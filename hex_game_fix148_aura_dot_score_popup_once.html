      state.firstPlacedSource=move.source;
      if(move.source==="hand"){
        while(state.placementsThisTurn < 3 && state.hands[player].filter(Boolean).length > 0){
          const bonus=aiBonusFromHand(player);
          if(!bonus) break;

          await delay(450);
    if(runToken!==aiRunToken || state.paused){ aiRunning=false; return; }
          setAIFlash({kind:"hand", player, index:bonus.index});
          setStatus(`${cap(player)} selects bonus hand tile...`);
          await delay(700);
    if(runToken!==aiRunToken || state.paused){ aiRunning=false; return; }
          clearAIFlash();
          await delay(200);
    if(runToken!==aiRunToken || state.paused){ aiRunning=false; return; }

          const beforeScores=scoreSnapshot();
          const beforeTiles=scoringTileSnapshot();
          const overwrittenTile=state.board[`${bonus.q},${bonus.r}`] ? clone(state.board[`${bonus.q},${bonus.r}`].tile) : null;
          const btile=clone(bonus.tile);
          state.hands[player][bonus.index]=null;
          placeBoardTileWithOverwrite(btile,bonus.q,bonus.r,"hand");
          state.placementsThisTurn++;
          state.lastPlaced={q:bonus.q,r:bonus.r};
          triggerScoreDelta(beforeScores,beforeTiles);
          recordTrainingMove({player,action:"board",source:"hand",destination:"board",q:bonus.q,r:bonus.r,tile:btile,rotation:bonus.rotation||0,overwrittenTile,scoresBefore:beforeScores,scoresAfter:compactScores()});

          setAIFlash(aiPlacementFlash(bonus.q, bonus.r, player));
          setStatus(`${cap(player)} places bonus tile${bonus.rotation ? " rotated "+(bonus.rotation*60)+"°" : ""}...`);
          renderAll();
          await delay(800);
    if(runToken!==aiRunToken || state.paused){ aiRunning=false; return; }
          clearAIFlash();
        }
      }
    }
  } else if(move.kind==="hand"){
    const beforeScores=compactScores();
    state.hands[player][move.handIndex]=clone(tile);
    recordTrainingMove({player,action:"store",source:move.source,destination:"hand",handIndex:move.handIndex,tile,scoresBefore:beforeScores,scoresAfter:compactScores()});
    setMoveFlash({kind:"hand",player,index:move.handIndex});
    triggerHandGlow(player, move.handIndex);
    setAIFlash({kind:"hand", player, index:move.handIndex});
    setStatus(`${cap(player)} stores tile in hand.`);
    await delay(850);
    if(runToken!==aiRunToken || state.paused){ aiRunning=false; return; }
    clearAIFlash();
  } else if(move.kind==="pool"){
    const beforeScores=compactScores();
    state.pool[move.poolIndex]=clone(tile);
    recordTrainingMove({player,action:"pool",source:move.source,destination:"pool",poolIndex:move.poolIndex,tile,scoresBefore:beforeScores,scoresAfter:compactScores()});
    setMoveFlash({kind:"pool",player,index:move.poolIndex});
    setAIFlash({kind:"pool", player, index:move.poolIndex});
    setStatus(move.source==="deck" ? `${cap(player)} dumps deck tile to pool and may draw again.` : `${cap(player)} places tile in pool.`);
    await delay(850);
    if(runToken!==aiRunToken || state.paused){ aiRunning=false; return; }
    clearAIFlash();

    if(move.source==="deck"){
      state.deckDumpRunActive=true;
      state.deckDumpsThisTurn=(state.deckDumpsThisTurn||0)+1;
      state.selected=null;
      renderAll();
      if(state.deck.length){
        aiRunning=false;
        maybeAutoRunAI();
        return;
      }
    }
  }

  state.selected=null;
  state.placementsThisTurn=0;
  state.firstPlacedSource=null;
  state.lastPlaced=null;

  if(maybeEndGame()){ aiRunning=false; return; }

  advanceTurn();
  commitHistory();
  renderAll();
  if(isCurrentPlayerHuman()){
    const msg = isOpeningTurn("red") ? "Red's turn. You may wait and build your hand, or start placing tiles from hand onto the board." : "Red's turn. Place on any legal hex; occupied hexes may be overwritten if the displaced tile fits in pool.";
    setStatus(msg);
    aiRunning=false;
  } else {
    aiRunning=false;
    maybeAutoRunAI();
  }
}

function colorSectionComponentsForPlayer(player){
  const cells=[];
  const idx=new Map();

  for(const key of Object.keys(state.board)){
    if(key==="0,0") continue;
    const [q,r]=key.split(",").map(Number);
    const tile=state.board[key].tile;
    if(!tile || !tile.sides) continue;

    for(let side=0; side<6; side++){
      if(tile.sides[side]!==player) continue;
      const id=`${key}|${side}`;
      idx.set(id,cells.length);
      cells.push({id,key,q,r,side,tile});
    }
  }

  const adj=Array.from({length:cells.length},()=>[]);
  const externalLink=Array.from({length:cells.length},()=>false);

  function add(a,b,external=false){
    if(a<0 || b<0) return;
    adj[a].push(b);
    adj[b].push(a);
    if(external){ externalLink[a]=true; externalLink[b]=true; }
  }

  for(const cell of cells){
    const a=idx.get(cell.id);

    // Internal same-color section adjacency inside a tile. Boundaries between same-color
    // wedges disappear; boundaries against different colors remain visible.
    for(const nbSide of [(cell.side+5)%6,(cell.side+1)%6]){
      const b=idx.get(`${cell.key}|${nbSide}`);
      if(b!==undefined) add(a,b,false);
    }

    // External link across this visual side's actual board neighbor.
    const nb=neighborForSide(cell.q,cell.r,cell.side);
    if(!nb || isCenterVoid(nb.q,nb.r)) continue;
    const nKey=`${nb.q},${nb.r}`;
    const neighbor=state.board[nKey];
    if(!neighbor) continue;

    const theirSide=sharedSideIndex(nb.q,nb.r,cell.q,cell.r);
    const b=idx.get(`${nKey}|${theirSide}`);
    if(b!==undefined && scoringLink(player,cell.tile,cell.side,neighbor.tile,theirSide)){
      add(a,b,true);
    }
  }

  const seen=new Set();
  const comps=[];

  for(let i=0;i<cells.length;i++){
    if(seen.has(i)) continue;
    const stack=[i];
    const comp=[];
    seen.add(i);

    while(stack.length){
      const cur=stack.pop();
      comp.push(cur);
      for(const nxt of adj[cur]){
        if(!seen.has(nxt)){
          seen.add(nxt);
          stack.push(nxt);
        }
      }
    }

    const tileKeys=new Set(comp.map(n=>cells[n].key));
    const hasExternal=comp.some(n=>externalLink[n]);

    // Captured/scoring color regions require a real cross-tile link.
    if(tileKeys.size>=2 && hasExternal){
      comps.push({player, cellIndexes:comp, cells:comp.map(n=>cells[n])});
    }
  }

  return comps;
}

function allScoringComponents(){
  return PLAYERS.flatMap(player=>colorSectionComponentsForPlayer(player));
}

function neighborForSide(q,r,side){
  for(const [dq,dr] of NEIGHBORS){
    const nq=q+dq, nr=r+dr;
    if(sharedSideIndex(q,r,nq,nr)===side){
      return {q:nq, r:nr};
    }
  }
  return null;
}

function tileVertexXY(q,r,vertex,size=BOARD_HEX_SIZE){
  const [x,y]=axialToXY(q,r,size);
  const rad=Math.PI*(vertex*60)/180;
  return {x:x+size*Math.cos(rad), y:y+size*Math.sin(rad)};
}

function tileCenterXY(q,r,size=BOARD_HEX_SIZE){
  const [x,y]=axialToXY(q,r,size);
  return {x,y};
}

function lineKey(a,b){
  const p1=`${Math.round(a.x*100)/100},${Math.round(a.y*100)/100}`;
  const p2=`${Math.round(b.x*100)/100},${Math.round(b.y*100)/100}`;
  return p1<p2 ? `${p1}|${p2}` : `${p2}|${p1}`;
}

function segmentPointKey(p){
  return `${Math.round(p.x*100)/100},${Math.round(p.y*100)/100}`;
}



function ensureSvgDefs(svg){
  let defs=svg.querySelector("defs");
  if(!defs){
    defs=svgel("defs");
    svg.insertBefore(defs, svg.firstChild);
  }
  return defs;
}

// CAPTURED_AREA_VISUAL_ONLY_RULE:
 // Linked/captured areas are scoring + visual overlays only.
 // They do not change the underlying individual tiles, and they do not transfer
 // protection, black-edge behavior, gray behavior, overwrite immunity, or any other trait.
function drawCapturedAreaOverlay(svg, comp){
  const player=comp.player;
  const fillColor=COLORS[player];
  const light=playerHighlighterColor(player);
  const cellSet=new Set(comp.cells.map(c=>c.id));
  const boundarySegments=[];
  const seamSegments=[];
  const seamSeen=new Set();

  function sameComp(id){ return cellSet.has(id); }
  function addBoundary(a,b,isGridLine=false){ boundarySegments.push({a,b,isGridLine}); }
  function addInternalSeam(a,b){
    const k=lineKey(a,b);
    if(seamSeen.has(k)) return;
    seamSeen.add(k);
    seamSegments.push({a,b});
  }

  const clipId=`capClip_${player}_${Math.random().toString(36).slice(2)}`;
  const defs=ensureSvgDefs(svg);
  const clip=svgel("clipPath",{id:clipId, clipPathUnits:"userSpaceOnUse"});

  function addCapturedOverlayElement(el){
    el.setAttribute("pointer-events","none");
    el.style.pointerEvents="none";
    svg.appendChild(el);
    return el;
  }

  // First repaint the captured region itself. This covers all prior tile seam lines
  // inside the linked area, so the visible shape behaves like one expanding blob.
  for(const cell of comp.cells){
    const center=tileCenterXY(cell.q,cell.r,BOARD_HEX_SIZE);
    const a=tileVertexXY(cell.q,cell.r,cell.side,BOARD_HEX_SIZE);
    const b=tileVertexXY(cell.q,cell.r,(cell.side+1)%6,BOARD_HEX_SIZE);
    const pts=`${center.x},${center.y} ${a.x},${a.y} ${b.x},${b.y}`;

    clip.appendChild(svgel("polygon",{points:pts}));

    const boardTile = state.board[cell.key]?.tile;
    if(!(boardTile && boardTile.starter===true && boardTile.owner)){
      // Captured/linked area is visual scoring highlight only.
      // It does NOT merge tiles or transfer traits/protection/black/gray behavior.
      // Keep it translucent so the underlying individual tile properties remain visible.
      addCapturedOverlayElement(svgel("polygon",{
        points:pts,
        fill:light,
        stroke:"none",
        opacity:"0.16"
      }));
    }
  }
  defs.appendChild(clip);

  // Build only the current outer boundary of the whole linked color area.
  for(const cell of comp.cells){
    const key=cell.key;
    const side=cell.side;

    // Outer edge boundary: only if this exact visual side does not continue
    // into another cell of the same captured component.
    const nb=neighborForSide(cell.q,cell.r,side);
    let externalContinues=false;

    if(nb && !isCenterVoid(nb.q,nb.r)){
      const nKey=`${nb.q},${nb.r}`;
      const neighbor=state.board[nKey];
      if(neighbor){
        const theirSide=sharedSideIndex(nb.q,nb.r,cell.q,cell.r);
        externalContinues = sameComp(`${nKey}|${theirSide}`);
      }
    }

    const edgeA=tileVertexXY(cell.q,cell.r,side,BOARD_HEX_SIZE);
    const edgeB=tileVertexXY(cell.q,cell.r,(side+1)%6,BOARD_HEX_SIZE);

    if(externalContinues){
      addInternalSeam(edgeA, edgeB);
    } else {
      addBoundary(edgeA, edgeB, true);
    }

    // Internal split boundaries inside bicolor/tricolor tiles are perimeter only
    // when the adjacent wedge is not part of this same captured region.
    const center=tileCenterXY(cell.q,cell.r,BOARD_HEX_SIZE);

    const prev=(side+5)%6;
    if(!sameComp(`${key}|${prev}`)){
      addBoundary(center, tileVertexXY(cell.q,cell.r,side,BOARD_HEX_SIZE), false);
    }

    const next=(side+1)%6;
    if(!sameComp(`${key}|${next}`)){
      addBoundary(center, tileVertexXY(cell.q,cell.r,(side+1)%6,BOARD_HEX_SIZE), false);
    }
  }

  // Chain boundary segments into continuous paths.
  for(const s of seamSegments){
    // More visible internal board-grid line inside the linked area:
    // thicker, darker, and still slightly tinted by the area color.
    addCapturedOverlayElement(svgel("line",{
      x1:s.a.x,y1:s.a.y,x2:s.b.x,y2:s.b.y,
      stroke:playerNearBlackGridColor(player),
      "stroke-width":"1.9",
      "stroke-linecap":"round",
      opacity:"0.9"
    }));
    // Thin lighter color highlight on the same gridline.
    addCapturedOverlayElement(svgel("line",{
      x1:s.a.x,y1:s.a.y,x2:s.b.x,y2:s.b.y,
      stroke:playerLightColor(player),
      "stroke-width":"0.5",
      "stroke-linecap":"round",
      opacity:"0.55"
    }));
  }

  const edges=boundarySegments.map((s,i)=>({
    i,
    a:s.a,
    b:s.b,
    isGridLine:!!s.isGridLine,
    ak:segmentPointKey(s.a),
    bk:segmentPointKey(s.b),
    used:false
  }));

  const byPoint=new Map();
  for(const e of edges){
    if(!byPoint.has(e.ak)) byPoint.set(e.ak,[]);
    if(!byPoint.has(e.bk)) byPoint.set(e.bk,[]);
    byPoint.get(e.ak).push(e);
    byPoint.get(e.bk).push(e);
  }

  function otherKey(e,k){ return e.ak===k ? e.bk : e.ak; }
  function pointForKey(k){
    const e=(byPoint.get(k)||[])[0];
    if(!e) return null;
    return e.ak===k ? e.a : e.b;
  }

  for(const first of edges){
    if(first.used) continue;

    const pts=[first.a, first.b];
    first.used=true;
    let currentKey=first.bk;
    let guard=0;

    while(guard++<500){
      const candidates=(byPoint.get(currentKey)||[]).filter(e=>!e.used);
      if(!candidates.length) break;

      const next=candidates[0];
      next.used=true;
      const nextKey=otherKey(next,currentKey);
      const p=pointForKey(nextKey);
      if(p) pts.push(p);
      currentKey=nextKey;

      if(currentKey===segmentPointKey(pts[0])) break;
    }

    if(pts.length>=2){
      let d=`M ${pts[0].x} ${pts[0].y}`;
      for(let i=1;i<pts.length;i++) d+=` L ${pts[i].x} ${pts[i].y}`;
      if(segmentPointKey(pts[0])===segmentPointKey(pts[pts.length-1])) d+=" Z";

      addCapturedOverlayElement(svgel("path",{
        d,
        fill:"none",
        stroke:light,
        "stroke-width":"5.4",
        "stroke-linejoin":"round",
        "stroke-linecap":"round",
        opacity:"0.56",
        "clip-path":`url(#${clipId})`
      }));
    }
  }

  // Re-draw true board hex gridlines where the translucent perimeter sits over them,
  // so the grid remains visible as if seen through the outline.
  const boundarySeen=new Set();
  for(const s of boundarySegments){
    if(!s.isGridLine) continue;
    const k=lineKey(s.a,s.b);
    if(boundarySeen.has(k)) continue;
    boundarySeen.add(k);
    addCapturedOverlayElement(svgel("line",{
      x1:s.a.x,y1:s.a.y,x2:s.b.x,y2:s.b.y,
      stroke:playerNearBlackGridColor(player),
      "stroke-width":"1.25",
      "stroke-linecap":"round",
      opacity:"0.58"
    }));
    addCapturedOverlayElement(svgel("line",{
      x1:s.a.x,y1:s.a.y,x2:s.b.x,y2:s.b.y,
      stroke:playerLightColor(player),
      "stroke-width":"0.38",
      "stroke-linecap":"round",
      opacity:"0.36"
    }));
  }
}

function vertexBonusMarkersForPlayer(player){
  const vertices = new Map();
  for(const key of Object.keys(state.board)){
    if(key==="0,0") continue;
    const [q,r]=key.split(",").map(Number);
    const tile=state.board[key].tile;
    const [cx,cy]=axialToXY(q,r,BOARD_HEX_SIZE);
    for(let i=0;i<6;i++){
      const a=Math.PI*(i*60)/180;
      const vx=cx + BOARD_HEX_SIZE*Math.cos(a);
      const vy=cy + BOARD_HEX_SIZE*Math.sin(a);
      const vkey=`${Math.round(vx*1000)/1000},${Math.round(vy*1000)/1000}`;
      if(!vertices.has(vkey)) vertices.set(vkey,{x:vx,y:vy,edges:[]});
      vertices.get(vkey).edges.push(tile.sides[i]);
      vertices.get(vkey).edges.push(tile.sides[(i+5)%6]);
    }
  }
  return Array.from(vertices.values()).filter(v=>v.edges.length===6 && v.edges.every(c=>c===player));
}

function drawVertexBonusMarker(svg, player, x, y){
  const dark=playerDarkColor(player);
  const light=playerLightColor(player);
  svg.appendChild(svgel("circle",{
    cx:x, cy:y, r:7.2,
    fill:"rgba(255,255,255,0.9)",
    stroke:light,
    "stroke-width":"3"
  }));
  for(const angle of [0,60,120]){
    const rad=Math.PI*angle/180;
    const dx=Math.cos(rad)*6.1;
    const dy=Math.sin(rad)*6.1;
    svg.appendChild(svgel("line",{
      x1:x-dx,y1:y-dy,x2:x+dx,y2:y+dy,
      stroke:dark,
      "stroke-width":"2.2",
      "stroke-linecap":"round"
    }));
  }
}

function renderCapturedAreaOverlays(svg){
  for(const comp of allScoringComponents()){
    drawCapturedAreaOverlay(svg, comp);
  }
  // Vertex bonus remains scored, but no longer has a visual marker.
}

function linkedScoringSidesForBoardCell(q,r,tile){
  const sides=[];
  if(!tile) return sides;

  for(const [dq,dr] of NEIGHBORS){
    const nq=q+dq, nr=r+dr;
    if(isCenterVoid(nq,nr)) continue;

    const neighbor=state.board[`${nq},${nr}`];
    if(!neighbor) continue;

    const mySide=sharedSideIndex(q,r,nq,nr);
    const theirSide=sharedSideIndex(nq,nr,q,r);

    for(const player of PLAYERS){
      if(scoringLink(player,tile,mySide,neighbor.tile,theirSide)){
        sides.push(mySide);
        break;
      }
    }
  }

  return sides;
}


function blackBlockedDirectionsForCell(q,r){
  const dirs=[];
  if(state.board[`${q},${r}`]) return dirs;
  for(const [dq,dr] of NEIGHBORS){
    const nq=q+dq, nr=r+dr;
    if(isCenterVoid(nq,nr)) continue;
    const neighbor=state.board[`${nq},${nr}`];
    if(!neighbor || !neighbor.tile) continue;
    const theirSide=sharedSideIndex(nq,nr,q,r);
    if(neighbor.tile.sides[theirSide]==="black"){
      dirs.push(sharedSideIndex(q,r,nq,nr));
    }
  }
  return dirs;
}

function ensureBlackBlockGradient(svg){
  const defs=ensureSvgDefs(svg);
  if(!svg.querySelector("#blackBlockGradient")){
    const grad=svgel("radialGradient",{id:"blackBlockGradient",cx:"50%",cy:"50%",r:"55%"});
    grad.appendChild(svgel("stop",{offset:"0%","stop-color":"rgba(25,15,7,0.58)"}));
    grad.appendChild(svgel("stop",{offset:"45%","stop-color":"rgba(72,42,20,0.34)"}));
    grad.appendChild(svgel("stop",{offset:"100%","stop-color":"rgba(0,0,0,0)"}));
    defs.appendChild(grad);
  }
}

function drawBlackBlockedSpace(svg,x,y,size,dirs){
  if(!dirs || !dirs.length) return;
  const g=svgel("g");
  g.style.pointerEvents="none";

  // Hexagonal hazy gradient: stacked translucent hexes instead of a circle.
  const layers=[
    {scale:0.74, fill:"rgba(18,10,5,0.18)"},
    {scale:0.58, fill:"rgba(46,25,10,0.24)"},
    {scale:0.42, fill:"rgba(78,42,18,0.28)"},
    {scale:0.27, fill:"rgba(12,8,5,0.38)"}
  ];

  for(const layer of layers){
    g.appendChild(svgel("polygon",{
      points:hexPoints(x,y,size*layer.scale),
      fill:layer.fill,
      stroke:"none"
    }));
  }

  // Directional hazy wedges pointing toward the black edge(s) that cause the block.
  for(const side of dirs){
    const a1=Math.PI*(side*60)/180;
    const a2=Math.PI*(((side+1)%6)*60)/180;
    const mid=Math.PI*((side*60)+30)/180;

    const p1={x:x+Math.cos(a1)*size*0.68, y:y+Math.sin(a1)*size*0.68};
    const p2={x:x+Math.cos(a2)*size*0.68, y:y+Math.sin(a2)*size*0.68};
    const c1={x:x+Math.cos(mid)*size*0.18, y:y+Math.sin(mid)*size*0.18};

    g.appendChild(svgel("polygon",{
      points:`${c1.x},${c1.y} ${p1.x},${p1.y} ${p2.x},${p2.y}`,
      fill:"rgba(20,12,6,0.34)",
      stroke:"none"
    }));

    const px=x+Math.cos(mid)*size*0.42;
    const py=y+Math.sin(mid)*size*0.42;
    g.appendChild(svgel("polygon",{
      points:hexPoints(px,py,size*0.15),
      fill:"rgba(0,0,0,0.34)",
      stroke:"none"
    }));
  }

  // Soft hex outline to clarify the blocked space while keeping it hazy.
  g.appendChild(svgel("polygon",{
    points:hexPoints(x,y,size*0.72),
    fill:"none",
    stroke:"rgba(42,23,10,0.28)",
    "stroke-width":"1.2"
  }));

  svg.appendChild(g);
}

function drawCenterVoid(svg,x,y,size){
  // Center remains a no-space/non-playable void, but is displayed as a gray cut jewel.
  drawJewelTile(svg, {
    kind:"solid",
    sides:["gray","gray","gray","gray","gray","gray"],
    starter:true,
    owner:"gray"
  }, x, y, size, {});
}


function drawProtectedAuraCornerTicks(svg,x,y,size,strong=false){
  const tickLen = size * 0.14;
  const stroke = strong ? "rgba(255,232,122,0.96)" : "rgba(255,222,118,0.72)";
  const width = strong ? 1.85 : 1.25;

  const g=svgel("g");
  g.setAttribute("pointer-events","none");
  g.style.pointerEvents="none";

  for(let i=0;i<6;i++){
    const a=Math.PI*(i*60)/180;
    const prev=Math.PI*(((i+5)%6)*60)/180;
    const next=Math.PI*(((i+1)%6)*60)/180;

    const vx=x+size*Math.cos(a);
    const vy=y+size*Math.sin(a);

    // Short bracket arms just inside each hex corner.
    const p1x=vx + (x+size*Math.cos(prev)-vx)*0.16;
    const p1y=vy + (y+size*Math.sin(prev)-vy)*0.16;
    const p2x=vx + (x+size*Math.cos(next)-vx)*0.16;
    const p2y=vy + (y+size*Math.sin(next)-vy)*0.16;

    const poly=svgel("polyline",{
      points:`${p1x},${p1y} ${vx},${vy} ${p2x},${p2y}`,
      fill:"none",
      stroke,
      "stroke-width":String(width),
      "stroke-linecap":"round",
      "stroke-linejoin":"round",
      opacity:strong ? "0.98" : "0.82"
    });
    g.appendChild(poly);
  }

  // Small center dot: protected-aura indicator, not ownership/scoring.
  g.appendChild(svgel("circle",{
    cx:x,
    cy:y,
    r:strong ? size*0.105 : size*0.085,
    fill:strong ? "rgba(255,228,84,0.94)" : "rgba(255,216,80,0.72)",
    stroke:"rgba(96,66,0,0.34)",
    "stroke-width":strong ? "0.9" : "0.6",
    opacity:strong ? "0.96" : "0.78"
  }));

  svg.appendChild(g);
}

function renderProtectedAuraTicks(svg){
  for(let q=-BOARD_RADIUS;q<=BOARD_RADIUS;q++){
    for(let r=-BOARD_RADIUS;r<=BOARD_RADIUS;r++){
      const s=-q-r;
      if(Math.max(Math.abs(q),Math.abs(r),Math.abs(s))>BOARD_RADIUS) continue;
      if(isCenterVoid(q,r)) continue;

      if(!isProtectedOverwriteSpace(q,r)) continue;

      const [x,y]=axialToXY(q,r,BOARD_HEX_SIZE);
      const occupied=!!state.board[`${q},${r}`];
      const strong=!!(state.selected && state.selected.source==="hand" && occupied);

      drawProtectedAuraCornerTicks(svg,x,y,BOARD_HEX_SIZE-1.9,strong);
    }
  }
}


function renderBoard(){
  const svg=document.getElementById("board"); svg.innerHTML="";
  for(let q=-BOARD_RADIUS;q<=BOARD_RADIUS;q++){
    for(let r=-BOARD_RADIUS;r<=BOARD_RADIUS;r++){
      const s=-q-r; if(Math.max(Math.abs(q),Math.abs(r),Math.abs(s))>BOARD_RADIUS) continue;
      const [x,y]=axialToXY(q,r,BOARD_HEX_SIZE);
      if(isCenterVoid(q,r)){
        drawCenterVoid(svg,x,y,BOARD_HEX_SIZE-1.1);
        continue;
      }
      const occ=state.board[`${q},${r}`];
      const bonusAllowed=state.firstPlacedSource==="hand";
      const continuedHandAllowed = (state.placementsThisTurn>=1 && state.placementsThisTurn<3 && state.firstPlacedSource==="hand" && state.selected && state.selected.source==="hand");
      const placementTurnAllowed = !!(state.selected && !(state.placementsThisTurn>=1 && !continuedHandAllowed));
      const legal=!!(placementTurnAllowed && isBoardPlacementLegal(currentPlayer(),state.selected.tile,q,r,false,state.selected.source));
      const baseStroke = occ ? (legal ? playerStrokeColor(currentPlayer()) : "none") : (legal ? playerStrokeColor(currentPlayer()) : "#000");
      const poly=svgel("polygon",{points:hexPoints(x,y,BOARD_HEX_SIZE),fill:"#fff",stroke:baseStroke,"stroke-width":legal?2.2:1.25});
      if(legal) applyMoveGlow(poly,currentPlayer());
      if(state.selected && isCurrentPlayerHuman()){ poly.style.cursor="pointer"; poly.addEventListener("click",()=>placeSelectedOnBoard(q,r)); }
      svg.appendChild(poly);
      if(!occ){
        const blockedDirs=blackBlockedDirectionsForCell(q,r);
        if(blockedDirs.length) drawBlackBlockedSpace(svg,x,y,BOARD_HEX_SIZE,blockedDirs);
      }
      if(occ) drawTile(svg,occ.tile,x,y,BOARD_HEX_SIZE+0.35,{});
      if(state.scoreFlashTiles && state.scoreFlashTiles.includes(`${q},${r}`)){
        const scoreFlash=svgel("polygon",{
          points:hexPoints(x,y,BOARD_HEX_SIZE+2.2),
          fill:"none",
          stroke:"#fff7a8",
          "stroke-width":"4.2"
        });
        scoreFlash.classList.add("scoreTileFlash");
        svg.appendChild(scoreFlash);
      }
      if(state.selected && isCurrentPlayerHuman()){
        const hit=svgel("polygon",{points:hexPoints(x,y,BOARD_HEX_SIZE),fill:"transparent",stroke:"none"});
        hit.style.cursor="pointer";
        hit.addEventListener("click",()=>placeSelectedOnBoard(q,r));
        svg.appendChild(hit);
      }
      const boardAIFlash=!!(state.aiFlash && state.aiFlash.kind==="board" && state.aiFlash.q===q && state.aiFlash.r===r);
      const boardMoveFlash=!!(state.moveFlash && state.moveFlash.kind==="board" && state.moveFlash.q===q && state.moveFlash.r===r);
      if(boardAIFlash || boardMoveFlash){
        const flashPlayer=boardMoveFlash ? state.moveFlash.player : (state.aiFlash.player || currentPlayer());
        const flash=svgel("polygon",{points:hexPoints(x,y,BOARD_HEX_SIZE+1.5),fill:"none",stroke:playerMoveGlowColor(flashPlayer),"stroke-width":"4"});
        flash.classList.add("aiPlaced");
        applyMoveGlow(flash, flashPlayer);
        svg.appendChild(flash);
      }
    }
  }
  renderCapturedAreaOverlays(svg);
  renderProtectedAuraTicks(svg);
}
function renderTop(){
  normalizeTurnState();
  const playerLine=document.getElementById("playerTurnLabel");
  const turnLine=document.getElementById("turnNumberLabel");
  if(state.gameOver){
    playerLine.textContent = state.winner==="tie" ? "TIE GAME" : `${cap(state.winner).toUpperCase()} WON`;
    turnLine.textContent = `TURN ${state.turnNumber || 1}`;
  } else {
    playerLine.textContent = `${cap(currentPlayer()).toUpperCase()}'S TURN`;
    turnLine.textContent = `TURN ${state.turnNumber || 1}`;
  }
  const nt=document.getElementById("nextTurnBtn");
  if(nt) nt.disabled=!canUseNextTurn();
  const sp=document.getElementById("speedSelect");
  if(sp) sp.value=state.simSpeed || "Normal";
  updatePauseButton();
  // Detailed turn prompts are shown in the bottom status bar, not duplicated here.
}

function renderAll(){ renderTop(); renderDeck(); renderPool(); renderBoard(); renderHands(); renderScorePopup(); }
document.getElementById("undoBtn").addEventListener("click",undoMove);
document.getElementById("pauseBtn").addEventListener("click",togglePause);
document.getElementById("redoBtn").addEventListener("click",redoMove);
document.getElementById("nextTurnBtn").addEventListener("click",nextTurnNow);
document.getElementById("exportDataBtn").addEventListener("click",exportTrainingData);
document.getElementById("speedSelect").addEventListener("change",(e)=>{
  setSimSpeed(e.target.value);
  commitHistory();
  setStatus(`AI speed set to ${e.target.value}.`);
  maybeAutoRunAI();
});
document.getElementById("newGameBtn").addEventListener("click",()=>{
  cancelPendingEndTurn();
  aiRunToken++;
  state=createState();
  scorePopupRenderedId=0;
  state.paused=false;
  renderAll();
  resetHistory();
  setSimSpeed(state.simSpeed || "Normal");
  setStatus("Red's turn. Choose a tile from deck, hand, or pool.");
  maybeAutoRunAI();
});

renderAll();
setSimSpeed(state.simSpeed || "Normal");
resetHistory();
setStatus("Red's turn. Choose a tile from deck, hand, or pool.");
maybeAutoRunAI();
